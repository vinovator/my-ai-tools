<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Viewer | Vinoth's AI Tools</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- highlight.js: load both themes, toggle via .disabled -->
    <link id="hljs-light" rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
    <link id="hljs-dark"  rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" disabled>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">

    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js"></script>

    <style>
        :root {
            --primary: #0969da;
            --primary-soft: #ddf4ff;
            --bg-body: #ffffff;
            --bg-surface: #ffffff;
            --bg-subtle: #f6f8fa;
            --bg-code: #f6f8fa;
            --text-main: #1F2328;
            --text-muted: #6B7280;
            --text-link: #0969da;
            --border: #e1e4e8;
            --border-muted: #d0d7de;
            --danger: #cf222e;
            --danger-bg: #FEF2F2;
            --danger-text: #991B1B;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.04);
            --shadow-md: 0 6px 18px rgba(0, 0, 0, 0.08);
            --radius: 12px;
        }

        [data-theme="dark"] {
            --primary: #58a6ff;
            --primary-soft: #1f2937;
            --bg-body: #0d1117;
            --bg-surface: #0d1117;
            --bg-subtle: #161b22;
            --bg-code: #161b22;
            --text-main: #e6edf3;
            --text-muted: #8b949e;
            --text-link: #58a6ff;
            --border: #30363d;
            --border-muted: #444c56;
            --danger: #f85149;
            --danger-bg: #2d1416;
            --danger-text: #ffa198;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.4);
            --shadow-md: 0 6px 18px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        [hidden] { display: none !important; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            line-height: 1.5;
        }

        @media (prefers-reduced-motion: no-preference) {
            body { transition: background-color 0.15s, color 0.15s; }
        }

        /* ====================== Top ribbon (branded header) ====================== */
        .top-ribbon {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 76px;
            background: linear-gradient(135deg, #0b5fc9 0%, #218bff 100%);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 0 24px;
            z-index: 100;
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.06), 0 4px 18px rgba(9, 105, 218, 0.18);
        }

        .ribbon-brand {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
            line-height: 1.15;
        }

        .ribbon-name {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.018em;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ribbon-tag {
            font-size: 0.78rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.82);
            letter-spacing: 0.005em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ribbon-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.005em;
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.28);
            background: rgba(255, 255, 255, 0.06);
            white-space: nowrap;
            flex-shrink: 0;
            transition: background-color 0.15s, color 0.15s, border-color 0.15s;
        }

        .ribbon-back:hover {
            background: rgba(255, 255, 255, 0.16);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.45);
        }

        .ribbon-back:focus-visible {
            outline: 2px solid #ffffff;
            outline-offset: 2px;
        }

        .ribbon-back svg {
            flex-shrink: 0;
            transition: transform 0.15s;
        }

        .ribbon-back:hover svg {
            transform: translateX(-2px);
        }

        /* Push fixed/sticky elements down by the ribbon's height */
        .top-bar { top: 76px; }
        .empty-page { padding-top: 108px; }

        @media (max-width: 560px) {
            .top-ribbon { padding: 0 16px; gap: 12px; }
            .ribbon-name { font-size: 1.2rem; }
            .ribbon-tag { font-size: 0.72rem; }
            .ribbon-back span { display: none; }
            .ribbon-back { padding: 7px 9px; }
        }

        @media print {
            .top-ribbon { display: none !important; }
        }

        /* ====================== Empty state ====================== */
        .empty-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 24px;
            padding: 40px 20px;
        }

        .empty-drop {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: min(560px, 100%);
            padding: 64px 32px;
            border: 2px dashed var(--border-muted);
            border-radius: 16px;
            background: var(--bg-subtle);
            cursor: pointer;
            text-align: center;
            transition: border-color 0.15s ease, background-color 0.15s ease;
        }

        .empty-drop:hover {
            border-color: var(--primary);
            background: var(--primary-soft);
        }

        .empty-drop.drag-over {
            border-color: var(--primary);
            border-style: solid;
            background: var(--primary-soft);
        }

        .empty-drop input[type="file"] { display: none; }

        .empty-drop .empty-icon {
            width: 56px;
            height: 56px;
            color: var(--text-muted);
        }

        .empty-drop h2 {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.01em;
        }

        .empty-drop p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .empty-drop small {
            color: var(--text-muted);
            font-size: 0.78rem;
            margin-top: 4px;
        }

        .empty-privacy {
            color: var(--text-muted);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ====================== Top bar ====================== */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 10px 20px;
            height: 52px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            backdrop-filter: saturate(180%) blur(8px);
        }

        .top-bar-left {
            display: flex;
            align-items: baseline;
            gap: 10px;
            min-width: 0;
            flex: 1;
        }

        .file-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-main);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 50vw;
        }

        .file-meta {
            color: var(--text-muted);
            font-size: 0.8rem;
            white-space: nowrap;
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 2px;
            flex-shrink: 0;
        }

        .icon-btn {
            background: transparent;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
            transition: background-color 0.15s, color 0.15s;
        }

        .icon-btn:hover {
            background: var(--bg-subtle);
            color: var(--text-main);
        }

        .icon-btn:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        .icon-btn svg {
            width: 18px;
            height: 18px;
        }

        .icon-btn.primary {
            color: var(--primary);
        }

        .top-bar-divider {
            width: 1px;
            height: 22px;
            background: var(--border);
            margin: 0 6px;
        }

        /* ====================== Article (reading column) ====================== */
        #preview {
            max-width: 760px;
            margin: 0 auto;
            padding: 40px 24px 96px;
        }

        /* ====================== TOC ====================== */
        .toc {
            position: fixed;
            top: 124px;
            left: max(16px, calc((100vw - 760px) / 2 - 240px - 16px));
            width: 220px;
            max-height: calc(100vh - 100px);
            overflow-y: auto;
            font-size: 0.84rem;
            color: var(--text-muted);
            padding-right: 8px;
        }

        .toc-header {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .toc ol {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .toc li.level-2 { padding-left: 12px; }
        .toc li.level-3 { padding-left: 24px; }

        .toc a {
            display: block;
            padding: 4px 8px;
            color: var(--text-muted);
            text-decoration: none;
            border-left: 2px solid transparent;
            border-radius: 0 6px 6px 0;
            line-height: 1.35;
            transition: color 0.12s, border-color 0.12s, background-color 0.12s;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .toc a:hover { color: var(--text-main); background: var(--bg-subtle); }

        .toc a.active {
            color: var(--primary);
            font-weight: 600;
            border-left-color: var(--primary);
        }

        /* Narrow viewport: TOC becomes a left drawer */
        .toc-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 25;
        }

        .toc-overlay.open { display: block; }

        @media (max-width: 1099px) {
            .toc {
                position: fixed;
                top: 96px;
                bottom: 0;
                left: 0;
                width: min(300px, 85vw);
                max-height: none;
                background: var(--bg-surface);
                border-right: 1px solid var(--border);
                padding: 20px 16px 20px 20px;
                transform: translateX(-100%);
                transition: transform 0.2s ease;
                z-index: 30;
            }
            .toc.open { transform: translateX(0); }
        }

        @media (min-width: 1100px) {
            #btn-toc { display: none; }
        }

        /* ====================== Toast ====================== */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--text-main);
            color: var(--bg-surface);
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 0.88rem;
            font-weight: 500;
            box-shadow: var(--shadow-md);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 40;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ====================== Inline error banner ====================== */
        .alert {
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            background: var(--danger-bg);
            color: var(--danger-text);
            border: 1px solid var(--danger);
        }

        .mermaid-error {
            padding: 10px 12px;
            background: var(--danger-bg);
            color: var(--danger-text);
            border: 1px solid var(--danger);
            border-radius: 6px;
            font-family: 'JetBrains Mono', ui-monospace, monospace;
            font-size: 0.82rem;
            margin: 12px 0;
        }

        /* ====================== Markdown body ====================== */
        .markdown-body {
            font-size: 1rem;
            line-height: 1.7;
            color: var(--text-main);
            word-wrap: break-word;
        }

        .markdown-body > *:first-child { margin-top: 0; }
        .markdown-body > *:last-child { margin-bottom: 0; }

        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3,
        .markdown-body h4,
        .markdown-body h5,
        .markdown-body h6 {
            position: relative;
            margin-top: 1.8em;
            margin-bottom: 0.6em;
            font-weight: 700;
            line-height: 1.25;
            letter-spacing: -0.01em;
            scroll-margin-top: 116px;
        }

        .markdown-body h1 {
            font-size: 2rem;
            padding-bottom: 0.3em;
            border-bottom: 1px solid var(--border);
        }
        .markdown-body h2 {
            font-size: 1.5rem;
            padding-bottom: 0.3em;
            border-bottom: 1px solid var(--border);
        }
        .markdown-body h3 { font-size: 1.25rem; }
        .markdown-body h4 { font-size: 1rem; }
        .markdown-body h5 { font-size: 0.92rem; }
        .markdown-body h6 { font-size: 0.85rem; color: var(--text-muted); }

        .markdown-body p { margin: 0 0 1em 0; }

        .markdown-body a {
            color: var(--text-link);
            text-decoration: none;
        }
        .markdown-body a:hover { text-decoration: underline; }

        .markdown-body ul,
        .markdown-body ol {
            padding-left: 2em;
            margin: 0 0 1em 0;
        }
        .markdown-body li { margin-bottom: 0.25em; }
        .markdown-body li > p { margin-top: 0.5em; }

        .markdown-body input[type="checkbox"] {
            margin-right: 6px;
            vertical-align: middle;
        }

        .markdown-body blockquote {
            margin: 0 0 1em 0;
            padding: 0.4em 1em;
            color: var(--text-muted);
            border-left: 4px solid var(--border-muted);
            background: var(--bg-subtle);
            border-radius: 0 6px 6px 0;
        }
        .markdown-body blockquote > :last-child { margin-bottom: 0; }

        .markdown-body hr {
            height: 1px;
            border: 0;
            background: var(--border);
            margin: 1.6em 0;
        }

        .markdown-body img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
        }

        .markdown-body table {
            display: block;
            width: max-content;
            max-width: 100%;
            overflow: auto;
            border-collapse: collapse;
            margin: 0 0 1em 0;
        }
        .markdown-body table th,
        .markdown-body table td {
            padding: 8px 13px;
            border: 1px solid var(--border-muted);
        }
        .markdown-body table th {
            background: var(--bg-subtle);
            font-weight: 600;
        }
        .markdown-body table tr:nth-child(2n) td {
            background: var(--bg-subtle);
        }

        .markdown-body code {
            font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 0.88em;
            background: var(--bg-subtle);
            padding: 0.18em 0.4em;
            border-radius: 4px;
        }

        .markdown-body pre {
            background: var(--bg-code);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
            overflow: auto;
            margin: 0 0 1em 0;
            line-height: 1.5;
        }

        .markdown-body pre code {
            background: transparent;
            padding: 0;
            font-size: 0.85em;
            border-radius: 0;
        }

        .markdown-body .mermaid-block {
            margin: 0 0 1em 0;
            padding: 14px;
            background: var(--bg-subtle);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow-x: auto;
            text-align: center;
        }
        .markdown-body .mermaid-block svg {
            max-width: 100%;
            height: auto;
        }

        .markdown-body .katex-display {
            margin: 1em 0;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 2px 0;
        }

        /* Heading anchors */
        .heading-anchor {
            opacity: 0;
            margin-left: 8px;
            font-weight: 400;
            text-decoration: none;
            color: var(--text-muted);
            transition: opacity 0.15s ease, color 0.15s ease;
            font-size: 0.85em;
        }
        .heading-anchor:hover { color: var(--primary); }
        .markdown-body h1:hover .heading-anchor,
        .markdown-body h2:hover .heading-anchor,
        .markdown-body h3:hover .heading-anchor,
        .markdown-body h4:hover .heading-anchor,
        .markdown-body h5:hover .heading-anchor,
        .markdown-body h6:hover .heading-anchor { opacity: 1; }

        /* ====================== Drop overlay (loaded state) ====================== */
        .drop-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(9, 105, 218, 0.08);
            border: 3px dashed var(--primary);
            pointer-events: none;
            z-index: 50;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-weight: 600;
            font-size: 1.1rem;
        }
        .drop-overlay.show { display: flex; }

        /* ====================== Print ====================== */
        @media print {
            :root {
                --bg-body: #ffffff;
                --bg-surface: #ffffff;
                --bg-subtle: #ffffff;
                --bg-code: #f6f8fa;
                --text-main: #1F2328;
                --text-muted: #6B7280;
                --border: #E5E7EB;
                --border-muted: #d0d7de;
                --primary: #0969da;
            }
            body { background: white; color: #1F2328; }
            .top-bar, .toc, .toc-overlay, .toast, .empty-page, .drop-overlay, #btn-toc { display: none !important; }
            #preview { max-width: none; padding: 0; }
            .markdown-body {
                font-size: 11pt;
                line-height: 1.5;
            }
            .markdown-body pre,
            .markdown-body table,
            .markdown-body .mermaid-block,
            .markdown-body blockquote {
                break-inside: avoid;
                page-break-inside: avoid;
            }
            .markdown-body h1,
            .markdown-body h2,
            .markdown-body h3 {
                break-after: avoid;
                page-break-after: avoid;
            }
            .heading-anchor { display: none; }
            @page { margin: 0.75in; }
        }
    </style>
</head>

<body data-theme="light">
    <div class="top-ribbon" role="banner">
        <div class="ribbon-brand">
            <span class="ribbon-name">Markdown Viewer</span>
            <span class="ribbon-tag">Local Markdown rendering with math, code, and diagrams.</span>
        </div>
        <a href="../index.html" class="ribbon-back" title="Back to Vinoth's AI Tools">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="19" y1="12" x2="5" y2="12"/>
                <polyline points="12 19 5 12 12 5"/>
            </svg>
            <span>Toolshelf</span>
        </a>
    </div>

    <!-- ============ Empty state ============ -->
    <main id="empty-page" class="empty-page">
        <label class="empty-drop" id="empty-drop">
            <input type="file" id="file-input" accept=".md,.markdown,.txt,text/markdown,text/plain">
            <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="9" y1="13" x2="15" y2="13"/>
                <line x1="9" y1="17" x2="13" y2="17"/>
            </svg>
            <h2>Drop a Markdown file here</h2>
            <p>or click to browse</p>
            <small>.md / .markdown / .txt · up to 5 MB</small>
        </label>
        <p class="empty-privacy">
            <span aria-hidden="true">&#128274;</span>
            Files never leave your browser. Nothing is uploaded.
        </p>
    </main>

    <!-- ============ Loaded state ============ -->
    <header id="top-bar" class="top-bar" hidden role="banner">
        <div class="top-bar-left">
            <span class="file-name" id="file-name"></span>
            <span class="file-meta" id="file-meta"></span>
        </div>
        <div class="top-bar-right">
            <button class="icon-btn" id="btn-toc" title="Toggle outline" aria-label="Toggle outline" hidden>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <line x1="4" y1="6"  x2="20" y2="6"/>
                    <line x1="4" y1="12" x2="20" y2="12"/>
                    <line x1="4" y1="18" x2="20" y2="18"/>
                </svg>
            </button>
            <span class="top-bar-divider"></span>
            <button class="icon-btn" id="btn-print" title="Print / Save as PDF" aria-label="Print / Save as PDF">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="6 9 6 2 18 2 18 9"/>
                    <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
                    <rect x="6" y="14" width="12" height="8"/>
                </svg>
            </button>
            <button class="icon-btn" id="btn-download" title="Download as HTML" aria-label="Download as HTML">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
            </button>
            <button class="icon-btn" id="btn-copy" title="Copy rendered HTML" aria-label="Copy rendered HTML">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
            </button>
            <button class="icon-btn" id="btn-clear" title="Open another file" aria-label="Open another file">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <line x1="6" y1="6" x2="18" y2="18"/>
                    <line x1="6" y1="18" x2="18" y2="6"/>
                </svg>
            </button>
            <span class="top-bar-divider"></span>
            <button class="icon-btn" id="btn-theme" title="Toggle theme" aria-label="Toggle theme">
                <svg id="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
                <svg id="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" hidden>
                    <circle cx="12" cy="12" r="4"/>
                    <line x1="12" y1="2" x2="12" y2="5"/>
                    <line x1="12" y1="19" x2="12" y2="22"/>
                    <line x1="2" y1="12" x2="5" y2="12"/>
                    <line x1="19" y1="12" x2="22" y2="12"/>
                    <line x1="4.93" y1="4.93" x2="7.05" y2="7.05"/>
                    <line x1="16.95" y1="16.95" x2="19.07" y2="19.07"/>
                    <line x1="4.93" y1="19.07" x2="7.05" y2="16.95"/>
                    <line x1="16.95" y1="7.05" x2="19.07" y2="4.93"/>
                </svg>
            </button>
        </div>
    </header>

    <aside id="toc" class="toc" hidden aria-label="Table of contents">
        <div class="toc-header">On this page</div>
        <ol id="toc-list"></ol>
    </aside>
    <div id="toc-overlay" class="toc-overlay" aria-hidden="true"></div>

    <article id="preview" class="markdown-body" hidden></article>

    <div id="drop-overlay" class="drop-overlay" aria-hidden="true">Drop to open</div>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script>
    (function () {
        const MAX_BYTES = 5 * 1024 * 1024;
        const $ = (id) => document.getElementById(id);

        const body = document.body;
        const fileInput = $('file-input');
        const emptyPage = $('empty-page');
        const emptyDrop = $('empty-drop');
        const topBar = $('top-bar');
        const fileNameEl = $('file-name');
        const fileMetaEl = $('file-meta');
        const preview = $('preview');
        const toc = $('toc');
        const tocList = $('toc-list');
        const tocOverlay = $('toc-overlay');
        const btnToc = $('btn-toc');
        const dropOverlay = $('drop-overlay');
        const toast = $('toast');
        const themeIconMoon = $('theme-icon-moon');
        const themeIconSun = $('theme-icon-sun');

        let currentName = '';
        let currentHeadings = [];
        let scrollObserver = null;

        // ---------- Library config ----------
        marked.setOptions({ gfm: true, breaks: false });

        function initMermaid(theme) {
            mermaid.initialize({
                startOnLoad: false,
                theme: theme === 'dark' ? 'dark' : 'default',
                securityLevel: 'strict'
            });
        }

        const PURIFY_CONFIG = {
            USE_PROFILES: { html: true, svg: true, mathMl: true },
            ADD_ATTR: ['class', 'style', 'viewBox', 'd', 'fill', 'stroke', 'transform', 'aria-hidden'],
            FORBID_TAGS: ['script', 'style', 'iframe', 'object', 'embed'],
            FORBID_ATTR: ['onerror', 'onload', 'onclick', 'onmouseover', 'onfocus']
        };

        // ---------- Theme ----------
        function applyTheme(theme) {
            body.dataset.theme = theme;
            $('hljs-light').disabled = (theme === 'dark');
            $('hljs-dark').disabled  = (theme !== 'dark');
            themeIconMoon.hidden = (theme === 'dark');
            themeIconSun.hidden  = (theme !== 'dark');
            initMermaid(theme);
            // Re-render mermaid blocks if any are present in current preview
            if (preview && !preview.hidden) {
                rerenderMermaid();
            }
        }

        function toggleTheme() {
            const next = body.dataset.theme === 'dark' ? 'light' : 'dark';
            applyTheme(next);
        }

        // ---------- Toast ----------
        let toastTimer = null;
        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 1600);
        }

        // ---------- Helpers ----------
        function formatBytes(n) {
            if (n < 1024) return n + ' B';
            if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
            return (n / (1024 * 1024)).toFixed(2) + ' MB';
        }

        function escapeText(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function setError(msg) {
            showLoadedState();
            preview.innerHTML = `<div class="alert">${escapeText(msg)}</div>`;
            toc.hidden = true;
            btnToc.hidden = true;
        }

        function showLoadedState() {
            emptyPage.hidden = true;
            topBar.hidden = false;
            preview.hidden = false;
        }

        function showEmptyState() {
            emptyPage.hidden = false;
            topBar.hidden = true;
            preview.hidden = true;
            preview.innerHTML = '';
            toc.hidden = true;
            toc.classList.remove('open');
            tocOverlay.classList.remove('open');
            btnToc.hidden = true;
            fileInput.value = '';
            currentName = '';
            currentHeadings = [];
            if (scrollObserver) { scrollObserver.disconnect(); scrollObserver = null; }
        }

        // ---------- File handling ----------
        function handleFile(file) {
            if (!file) return;
            if (file.size > MAX_BYTES) {
                showLoadedState();
                fileNameEl.textContent = file.name;
                fileMetaEl.textContent = formatBytes(file.size);
                setError(`File is too large (${formatBytes(file.size)}). Limit is 5 MB.`);
                return;
            }
            const reader = new FileReader();
            reader.onerror = () => {
                showLoadedState();
                setError('Could not read the file.');
            };
            reader.onload = (e) => {
                const text = (e.target && e.target.result) || '';
                currentName = file.name;
                fileNameEl.textContent = file.name;
                fileMetaEl.textContent = formatBytes(file.size);
                showLoadedState();
                renderMarkdown(text);
            };
            reader.readAsText(file);
        }

        // ---------- Render pipeline ----------
        async function renderMarkdown(md) {
            let html;
            try {
                html = marked.parse(md);
            } catch (err) {
                setError('Failed to parse Markdown: ' + (err && err.message ? err.message : err));
                return;
            }
            const clean = DOMPurify.sanitize(html, PURIFY_CONFIG);
            preview.innerHTML = clean;

            // Syntax highlighting (skip mermaid blocks)
            preview.querySelectorAll('pre > code').forEach((codeEl) => {
                if (/language-mermaid\b/.test(codeEl.className || '')) return;
                try { hljs.highlightElement(codeEl); } catch { /* non-fatal */ }
            });

            // KaTeX
            try {
                if (typeof renderMathInElement === 'function') {
                    renderMathInElement(preview, {
                        delimiters: [
                            { left: '$$', right: '$$', display: true },
                            { left: '$', right: '$', display: false },
                            { left: '\\(', right: '\\)', display: false },
                            { left: '\\[', right: '\\]', display: true }
                        ],
                        throwOnError: false
                    });
                }
            } catch (err) {
                console.warn('KaTeX render error:', err);
            }

            // Mermaid
            await renderMermaidBlocks(preview.querySelectorAll('pre > code.language-mermaid'));

            // TOC + heading anchors
            buildTOCAndAnchors(preview);

            // Scroll to fragment if URL had one
            if (location.hash) {
                const target = preview.querySelector(location.hash);
                if (target) target.scrollIntoView({ behavior: 'auto', block: 'start' });
            } else {
                window.scrollTo(0, 0);
            }
        }

        async function renderMermaidBlocks(codeBlocks) {
            for (let i = 0; i < codeBlocks.length; i++) {
                const codeEl = codeBlocks[i];
                const pre = codeEl.parentElement;
                const source = codeEl.textContent || '';
                const id = 'mermaid-svg-' + Date.now() + '-' + i;
                try {
                    const { svg } = await mermaid.render(id, source);
                    const wrapper = document.createElement('div');
                    wrapper.className = 'mermaid-block';
                    wrapper.dataset.mermaidSource = source;
                    wrapper.innerHTML = svg;
                    pre.replaceWith(wrapper);
                } catch (err) {
                    const errBox = document.createElement('div');
                    errBox.className = 'mermaid-error';
                    errBox.textContent = 'Mermaid render error: ' + (err && err.message ? err.message : err);
                    pre.replaceWith(errBox);
                }
            }
        }

        async function rerenderMermaid() {
            // Re-render every existing .mermaid-block using its stored source
            const blocks = preview.querySelectorAll('.mermaid-block');
            for (let i = 0; i < blocks.length; i++) {
                const wrapper = blocks[i];
                const source = wrapper.dataset.mermaidSource || '';
                if (!source) continue;
                const id = 'mermaid-svg-' + Date.now() + '-r' + i;
                try {
                    const { svg } = await mermaid.render(id, source);
                    wrapper.innerHTML = svg;
                } catch {
                    // leave existing svg untouched on re-render failure
                }
            }
        }

        // ---------- TOC + heading anchors ----------
        function slugify(text) {
            return (text || '')
                .toLowerCase()
                .replace(/[^a-z0-9\s-]/g, '')
                .trim()
                .replace(/\s+/g, '-')
                .replace(/-+/g, '-');
        }

        function buildTOCAndAnchors(root) {
            currentHeadings = Array.from(root.querySelectorAll('h1, h2, h3'));
            const used = new Set();
            currentHeadings.forEach((h) => {
                if (!h.id || used.has(h.id)) {
                    const base = slugify(h.textContent) || 'section';
                    let id = base;
                    let n = 1;
                    while (used.has(id)) id = base + '-' + (++n);
                    h.id = id;
                }
                used.add(h.id);

                if (!h.querySelector('.heading-anchor')) {
                    const a = document.createElement('a');
                    a.className = 'heading-anchor';
                    a.href = '#' + h.id;
                    a.textContent = '#';
                    a.title = 'Copy link to this heading';
                    a.setAttribute('aria-label', 'Anchor link');
                    a.addEventListener('click', (e) => {
                        e.preventDefault();
                        const url = location.href.split('#')[0] + '#' + h.id;
                        try { history.replaceState(null, '', '#' + h.id); } catch {}
                        if (navigator.clipboard && navigator.clipboard.writeText) {
                            navigator.clipboard.writeText(url).then(
                                () => showToast('Link copied'),
                                () => showToast('Link: ' + url)
                            );
                        } else {
                            showToast('Link: ' + url);
                        }
                    });
                    h.appendChild(a);
                }
            });

            if (currentHeadings.length < 3) {
                toc.hidden = true;
                btnToc.hidden = true;
                if (scrollObserver) { scrollObserver.disconnect(); scrollObserver = null; }
                return;
            }

            // Build TOC list
            tocList.innerHTML = '';
            currentHeadings.forEach((h) => {
                const li = document.createElement('li');
                li.className = 'level-' + h.tagName[1];
                const a = document.createElement('a');
                a.href = '#' + h.id;
                a.dataset.target = h.id;
                a.textContent = (h.textContent || '').replace(/#$/, '').trim();
                a.addEventListener('click', (e) => {
                    e.preventDefault();
                    const target = document.getElementById(h.id);
                    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    history.replaceState(null, '', '#' + h.id);
                    closeTocDrawer();
                });
                li.appendChild(a);
                tocList.appendChild(li);
            });

            toc.hidden = false;
            btnToc.hidden = false;
            attachScrollSpy();
        }

        function attachScrollSpy() {
            if (scrollObserver) scrollObserver.disconnect();
            const links = Array.from(tocList.querySelectorAll('a'));
            const linkById = Object.fromEntries(links.map((a) => [a.dataset.target, a]));
            scrollObserver = new IntersectionObserver((entries) => {
                const visible = entries
                    .filter((e) => e.isIntersecting)
                    .map((e) => e.target)
                    .sort((a, b) => a.getBoundingClientRect().top - b.getBoundingClientRect().top);
                if (!visible.length) return;
                const id = visible[0].id;
                links.forEach((a) => a.classList.toggle('active', a === linkById[id]));
            }, { rootMargin: '-116px 0px -65% 0px', threshold: 0 });
            currentHeadings.forEach((h) => scrollObserver.observe(h));
        }

        // ---------- TOC drawer (mobile) ----------
        function openTocDrawer() {
            toc.classList.add('open');
            tocOverlay.classList.add('open');
        }
        function closeTocDrawer() {
            toc.classList.remove('open');
            tocOverlay.classList.remove('open');
        }
        function toggleTocDrawer() {
            if (toc.classList.contains('open')) closeTocDrawer();
            else openTocDrawer();
        }

        // ---------- Actions ----------
        function downloadHTML() {
            const baseName = (currentName || 'document').replace(/\.(md|markdown|txt)$/i, '');
            const title = escapeText(baseName);
            const css = portableCss();
            // The downloaded HTML always uses light theme for printable consistency.
            const doc = `<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>${title}</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
<style>${css}</style>
</head>
<body><article class="markdown-body">${preview.innerHTML}</article></body>
</html>`;
            const blob = new Blob([doc], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = baseName + '.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 0);
            showToast('Downloaded');
        }

        function portableCss() {
            return `
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; color: #1F2328; background: #fff; max-width: 760px; margin: 40px auto; padding: 0 20px; line-height: 1.7; }
.markdown-body { font-size: 1rem; line-height: 1.7; color: #1F2328; word-wrap: break-word; }
.markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4, .markdown-body h5, .markdown-body h6 { margin-top: 1.6em; margin-bottom: 0.6em; font-weight: 700; line-height: 1.25; letter-spacing: -0.01em; }
.markdown-body h1 { font-size: 2rem; padding-bottom: 0.3em; border-bottom: 1px solid #E5E7EB; }
.markdown-body h2 { font-size: 1.5rem; padding-bottom: 0.3em; border-bottom: 1px solid #E5E7EB; }
.markdown-body h3 { font-size: 1.25rem; }
.markdown-body p { margin: 0 0 1em 0; }
.markdown-body a { color: #0969da; text-decoration: none; }
.markdown-body a:hover { text-decoration: underline; }
.markdown-body ul, .markdown-body ol { padding-left: 2em; margin: 0 0 1em 0; }
.markdown-body blockquote { margin: 0 0 1em 0; padding: 0.4em 1em; color: #6B7280; border-left: 4px solid #d0d7de; background: #F9FAFB; border-radius: 0 6px 6px 0; }
.markdown-body hr { height: 1px; border: 0; background: #E5E7EB; margin: 1.6em 0; }
.markdown-body img { max-width: 100%; height: auto; border-radius: 6px; }
.markdown-body table { display: block; width: max-content; max-width: 100%; overflow: auto; border-collapse: collapse; margin: 0 0 1em 0; }
.markdown-body table th, .markdown-body table td { padding: 8px 13px; border: 1px solid #d0d7de; }
.markdown-body table th { background: #F9FAFB; font-weight: 600; }
.markdown-body table tr:nth-child(2n) td { background: #fafbfc; }
.markdown-body code { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 0.88em; background: rgba(175, 184, 193, 0.2); padding: 0.18em 0.4em; border-radius: 4px; }
.markdown-body pre { background: #f6f8fa; border: 1px solid #E5E7EB; border-radius: 8px; padding: 14px 16px; overflow: auto; margin: 0 0 1em 0; line-height: 1.5; }
.markdown-body pre code { background: transparent; padding: 0; font-size: 0.85em; }
.markdown-body .mermaid-block { margin: 0 0 1em 0; padding: 14px; border: 1px solid #E5E7EB; border-radius: 8px; overflow-x: auto; text-align: center; }
.markdown-body .mermaid-block svg { max-width: 100%; height: auto; }
.markdown-body .katex-display { margin: 1em 0; overflow-x: auto; overflow-y: hidden; }
.heading-anchor { display: none; }
`;
        }

        async function copyHTML() {
            try {
                await navigator.clipboard.writeText(preview.innerHTML);
                showToast('Copied HTML to clipboard');
            } catch {
                const range = document.createRange();
                range.selectNodeContents(preview);
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
                try { document.execCommand('copy'); showToast('Copied HTML to clipboard'); }
                catch { showToast('Copy failed'); }
                sel.removeAllRanges();
            }
        }

        // ---------- Drag & drop ----------
        let dragDepth = 0;

        function isFileDrag(e) {
            const dt = e.dataTransfer;
            if (!dt) return false;
            const types = Array.from(dt.types || []);
            return types.indexOf('Files') !== -1;
        }

        window.addEventListener('dragenter', (e) => {
            if (!isFileDrag(e)) return;
            e.preventDefault();
            dragDepth++;
            if (emptyPage.hidden) {
                dropOverlay.classList.add('show');
            } else {
                emptyDrop.classList.add('drag-over');
            }
        });

        window.addEventListener('dragover', (e) => {
            if (!isFileDrag(e)) return;
            e.preventDefault();
        });

        window.addEventListener('dragleave', (e) => {
            if (!isFileDrag(e)) return;
            dragDepth--;
            if (dragDepth <= 0) {
                dragDepth = 0;
                dropOverlay.classList.remove('show');
                emptyDrop.classList.remove('drag-over');
            }
        });

        window.addEventListener('drop', (e) => {
            if (!isFileDrag(e)) return;
            e.preventDefault();
            dragDepth = 0;
            dropOverlay.classList.remove('show');
            emptyDrop.classList.remove('drag-over');
            const files = (e.dataTransfer && e.dataTransfer.files) || [];
            if (files.length) handleFile(files[0]);
        });

        // ---------- File picker ----------
        fileInput.addEventListener('change', (e) => {
            const files = e.target.files || [];
            if (files.length) handleFile(files[0]);
        });

        // ---------- Buttons ----------
        $('btn-print').addEventListener('click', () => window.print());
        $('btn-download').addEventListener('click', downloadHTML);
        $('btn-copy').addEventListener('click', copyHTML);
        $('btn-clear').addEventListener('click', showEmptyState);
        $('btn-theme').addEventListener('click', toggleTheme);
        btnToc.addEventListener('click', toggleTocDrawer);
        tocOverlay.addEventListener('click', closeTocDrawer);

        // ---------- Initial theme (always light; user can toggle to dark) ----------
        applyTheme('light');
    })();
    </script>
</body>

</html>
